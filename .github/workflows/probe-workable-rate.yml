# Bounded rate-probe for the UNAUTHENTICATED Workable widget endpoint, run from a GitHub Actions
# (datacenter) IP -- the SAME IP class the Tier-3 drain uses. This is the authoritative counterpart
# to a local/residential probe: Workable's edge treats datacenter IPs far more harshly (the finisher
# drain saw 87% failure -- 429 + gateway 5xx -- at 16/s, while a residential probe was clean to 48/s),
# so the cap that governs the drain MUST be measured from here, not a laptop.
#
# SAFETY: scripts/probe_workable_rate.py is bounded (per-step * steps, hard --max-requests backstop)
# and HARD-STOPS the ramp on the first 429/5xx storm (honouring Retry-After). Read-only GETs.
#
# Shares `concurrency: group: build-index` so it NEVER runs while the daily crawl or a drain is live
# -- otherwise the probe and the drain would fight for the same datacenter-IP quota and contaminate
# each other's measurement.
name: probe-workable-rate

on:
  workflow_dispatch:
    inputs:
      rates:
        description: "Comma-separated req/s ramp steps. Starts LOW because the CI IP 429/5xx's far below the residential 48/s knee -- we need to find where (or if) it goes clean."
        default: "8,12,16,24,32,48"
      per_step:
        description: "Requests per ramp step."
        default: "120"
      num_slugs:
        description: "Distinct board slugs to round-robin (per-board load = rate / num_slugs)."
        default: "80"
      max_requests:
        description: "Hard total-request backstop across the whole ramp."
        default: "1200"

permissions:
  contents: read   # only reads the published index asset for slugs

concurrency:
  group: build-index   # never simultaneous with the crawl/drain (shared datacenter-IP quota)
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install package
        run: uv venv && uv pip install -e "."
      - name: Download + gunzip the published index (for real workable board slugs)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download index-latest --dir dist --pattern 'index.sqlite.gz' --clobber
          gunzip -kf dist/index.sqlite.gz
      - name: Probe workable widget endpoint (bounded, hard-stops on 429/5xx)
        run: |
          uv run python scripts/probe_workable_rate.py \
            --slugs-from-index dist/index.sqlite \
            --num-slugs "${{ github.event.inputs.num_slugs || '80' }}" \
            --rates "${{ github.event.inputs.rates || '8,12,16,24,32,48' }}" \
            --per-step "${{ github.event.inputs.per_step || '120' }}" \
            --max-requests "${{ github.event.inputs.max_requests || '1200' }}" \
            --max-inflight 40 --cooldown 5 | tee dist/probe-result.txt
      - name: Upload probe result
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: workable-probe-result
          path: dist/probe-result.txt
