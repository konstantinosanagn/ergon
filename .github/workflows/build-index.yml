name: build-index

# Daily search-index build (free on a public repo). One polite incremental crawl publishes a
# SQLite/FTS5 snapshot to the stable `index-latest` release; the SDK downloads + queries it.
on:
  schedule:
    - cron: "17 4 * * *"   # 04:17 UTC daily (off-peak minute, not :00)
  workflow_dispatch:
    inputs:
      limit_companies:
        description: "Rotating-window size: boards considered this run (cursor advances each run; full registry covered over ceil(total/window) runs). Bounds CI time."
        default: "12000"
      rich:
        description: "Build the rich tier (--rich). OFF by default: the cold-start embedding adds ~2.4h. Set 'true' once the core index is publishing cleanly."
        default: "false"
      detail:
        description: "Run the Tier-3 detail reconcile + merge (--detail). Manual-only (not on the schedule) until it's proven out."
        default: "false"
      detail_max:
        description: "Per-run Tier-3 detail fetch budget (ERGON_DETAIL_MAX). Start small to measure latency/QPS/lift, then raise from data."
        default: "5000"

permissions:
  contents: write          # to publish the release asset

concurrency:
  group: build-index
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 330   # under the 6h hosted-runner ceiling
    steps:
      - uses: actions/checkout@v4

      - name: Add swap (headroom for large full crawls; build holds jobs in memory)
        continue-on-error: true  # best-effort insurance; never block the build on swap setup
        run: |
          # A full ~46k-board crawl can build a ~1M-row index; the in-memory merge/build can
          # exceed the runner's RAM. The runner already has an active /mnt/swapfile — turn it off,
          # recreate it much larger, and re-enable so a peak spike pages out instead of OOM-killing
          # a multi-hour build.
          sudo swapoff -a || true
          sudo rm -f /mnt/swapfile || true
          sudo fallocate -l 16G /mnt/swapfile || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=16384
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Ensure pigz (parallel gzip for the publish phase; Python gzip is the fallback)
        run: command -v pigz || sudo apt-get update && sudo apt-get install -y pigz

      - name: Install package
        # [semantic] pulls fastembed for the rich tier's pre-stored embeddings (--rich, below).
        run: uv venv && uv pip install -e ".[semantic]"

      - name: Download previous snapshot (best-effort; first run has none)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download index-latest --dir dist --pattern 'index.sqlite.gz' || echo "no prev index"
          gh release download index-latest --dir dist --pattern 'board_state.json' || echo "no prev state"
          gh release download index-latest --dir dist --pattern 'history.jsonl' || echo "no history"
          gh release download index-latest --dir dist --pattern 'crawl_cursor.json' || echo "no cursor"
          gh release download index-latest --dir dist --pattern 'deltas.json' || echo "no deltas window"
          gh release download index-latest --dir dist --pattern 'spec_health.json' || echo "no spec health"
          gh release download index-latest --dir dist --pattern 'index-vectors.sqlite.gz' || \
            gh release download index-latest --dir dist --pattern 'index-rich.sqlite.gz' || echo "no prev rich tier"
          gh release download index-latest --dir dist --pattern 'manifest-vectors.json' || echo "no prev vectors manifest"
          gh release download index-latest --dir dist --pattern 'index-detail.sqlite.gz' || echo "no prev detail tier"
          gh release download index-latest --dir dist --pattern 'manifest-detail.json' || echo "no prev detail manifest"
          [ -f dist/index.sqlite.gz ] && gunzip -kf dist/index.sqlite.gz || true
          # decompress the persisted Tier-3 detail sidecar so a manual --detail run carries forward
          # already-recovered fields + the retry/cursor state (only new/changed sigs re-fetch);
          # absent on first run (or every non-detail run, since it's manual-only) -> built cold.
          [ -f dist/index-detail.sqlite.gz ] && gunzip -kf dist/index-detail.sqlite.gz || true
          # decompress the persisted vectors sidecar so the incremental reconcile carries forward its
          # embeddings (only new/changed postings re-embed); absent on first run -> built cold.
          # One-time back-compat: the legacy asset carries the pre-migration schema (job_text + FTS).
          # Rename it into place; `_ensure_schema` detects the legacy tables and migrates on the runner,
          # preserving every already-computed embedding. Drop this fallback once missing==0.
          [ -f dist/index-rich.sqlite.gz ] && [ ! -f dist/index-vectors.sqlite.gz ] && \
            mv dist/index-rich.sqlite.gz dist/index-vectors.sqlite.gz || true
          [ -f dist/index-vectors.sqlite.gz ] && gunzip -kf dist/index-vectors.sqlite.gz || true

      # Stream B Tier-2: re-mint expired/near-expiry session tokens BEFORE the crawl, so token_ref
      # apicapture specs replay with a fresh token. Opt-in (only when a validated tier2_mint.json
      # exists) and best-effort — a browser-mint flake must never break the index build.
      - name: Tier-2 token refresh (opt-in; offline browser mint)
        if: hashFiles('scripts/tier2_mint.json') != ''
        continue-on-error: true
        env:
          ERGON_TOKEN_STORE: dist/tier2_tokens.json
        run: |
          uv pip install -e ".[browser]" && uv run playwright install --with-deps chromium
          uv run python scripts/tier2_refresh.py --store dist/tier2_tokens.json

      # The embedding model (~130MB ONNX) otherwise re-downloads every run — and would land in
      # TMPDIR=/mnt (wiped per run) via fastembed's default cache. Pin FASTEMBED_CACHE_PATH to a
      # stable dir (build step env below) and cache it across runs. Key tracks the model name
      # (semantic.DEFAULT_MODEL); bump it if ERGON_SEMANTIC_MODEL ever overrides the default.
      - name: Cache fastembed model (rich-tier embeddings)
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-BAAI-bge-small-en-v1.5

      - name: Build incremental index (exits non-zero if data-quality gates fail)
        env:
          SQLITE_TMPDIR: /mnt        # large temp disk for FTS/sort spills (/ has only ~14GB)
          TMPDIR: /mnt
          ERGON_TOKEN_STORE: dist/tier2_tokens.json  # token_ref specs read the freshly-minted tokens
          # Stable model cache dir (matches the cache step). Explicit path: env values are not
          # shell-expanded, so `~` would be taken literally by fastembed.
          FASTEMBED_CACHE_PATH: /home/runner/.cache/fastembed
          ERGON_RICH_MAX_EMBED: "250000"             # rich ramp: embed budget per run (see below)
          ERGON_DETAIL_MAX: "${{ github.event.inputs.detail_max || '5000' }}"   # Tier-3 detail: per-run fetch budget (manual-only; dispatch-overridable)
        run: |
          # --rich re-enabled after the OOM in run 28070765535 (killed at ~182min): the reconcile
          # now streams fresh_rich in chunks (no whole-table fetchall), embeds single-process (no
          # per-worker model copies), and bounds the cold start via ERGON_RICH_MAX_EMBED — deferred
          # rows count as `missing` and ramp in over subsequent daily runs via sig comparison.
          #
          # The old O(total-rows) growth term is GONE: the sidecar is vectors-only, so there is no
          # FTS5 'rebuild' rescanning job_text every run. Measured, run 29030371451 (vectors-only,
          # migrated the legacy sidecar in place): 137 min for the same 120k embeds, against a fitted
          # 352 min for the FTS-era run 4 — which would have blown the 330-min timeout and, because a
          # timeout kills the job BEFORE the publish step, taken the CORE index down with it.
          #
          # Cap raised 120k -> 250k from that measurement, not a guess. Non-rich baseline F (crawl +
          # build + publish) = 90 min mean / 111 max over 13 runs; embedding measures ~36 rows/s, so
          # 250k costs ~116 min: ~207 min typical, ~251 min worst case (F_max + 20% rate pessimism),
          # inside the 270-min target and well under the 330-min timeout. 300k would breach 270 in the
          # worst case and 400k would breach 330 — i.e. risk the core publish to save one run.
          # --rich is now ON for the daily schedule (and manual rich=true). The old O(total-rows)
          # FTS-rebuild growth term is gone (vectors-only sidecar), so runs measure ~106-137 min at
          # the 250k cap — well under the 330-min timeout. Coverage was ramped to ~84% via manual
          # bursts; daily runs drain the remaining tail (~40-60k/run) then maintain it (only new/
          # changed sigs re-embed). Rich stays a non-fatal add-on: the core index publishes first.
          # --detail is MANUAL-ONLY (workflow_dispatch with detail=true) -- unlike --rich it is
          # never folded into the daily schedule condition below, until the Tier-3 fetch path is
          # proven out over enough manual runs.
          uv run python scripts/build_index.py --incremental \
            --limit-companies "${{ github.event.inputs.limit_companies || '12000' }}" --sharded --out dist \
            ${{ (github.event.inputs.rich == 'true' || github.event_name == 'schedule') && '--rich' || '' }} \
            ${{ github.event.inputs.detail == 'true' && '--detail' || '' }}

      # Stream B self-healing: replay every apicapture spec, record health (streak persisted across
      # builds via dist/spec_health.json), and emit rediscover_queue.json for specs that rotted.
      - name: Spec health-check (self-healing re-discover queue)
        continue-on-error: true
        env:
          ERGON_SPEC_HEALTH: dist/spec_health.json
        run: uv run python scripts/spec_health_cron.py

      - name: Publish snapshot to the stable index-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Only upload artifacts that actually exist (a gate failure or --no-sharded run may omit
          # some), so one missing file never fails the whole publish.
          ASSETS=""
          for f in index.sqlite.gz manifest.json index-slim.sqlite.gz manifest-slim.json \
                   manifest-vectors.json manifest-detail.json \
                   index-delta.sqlite.gz manifest-delta.json deltas.json \
                   gates.json board_state.json history.jsonl spec_health.json rediscover_queue.json \
                   shards.json coverage.json INDEX_STATUS.md crawl_cursor.json; do
            [ -f "dist/$f" ] && ASSETS="$ASSETS dist/$f"
          done
          # The vectors db travels ONLY with its manifest. A non-rich run (every scheduled build --
          # --rich is manual-only) renames the legacy index-rich.sqlite.gz to index-vectors.sqlite.gz
          # on the runner so a later rich run can migrate it, but never regenerates it and never writes
          # manifest-vectors.json. Publishing that unpaired file would ship a legacy schema-v2 db under
          # a name that promises RICH_SCHEMA_VERSION=3. Only a rich build writes both together.
          [ -f dist/manifest-vectors.json ] && [ -f dist/index-vectors.sqlite.gz ] && \
            ASSETS="$ASSETS dist/index-vectors.sqlite.gz" || true
          # Same paired-asset guard for the Tier-3 detail sidecar: publish index-detail.sqlite.gz
          # ONLY when manifest-detail.json is also present, so a partial/interrupted download of
          # the prior pair (or any future schema migration, mirroring the vectors legacy-rename
          # case above) can never ship an unpaired db under a manifest that doesn't describe it.
          [ -f dist/manifest-detail.json ] && [ -f dist/index-detail.sqlite.gz ] && \
            ASSETS="$ASSETS dist/index-detail.sqlite.gz" || true
          ASSETS="$ASSETS $(ls dist/shard-*.sqlite.gz 2>/dev/null)"
          ASSETS="$ASSETS $(ls dist/index-delta-*.sqlite.gz 2>/dev/null)"  # v2.2 chain deltas
          if [ -z "$ASSETS" ]; then echo "no assets to publish"; exit 0; fi
          if gh release view index-latest >/dev/null 2>&1; then
            gh release upload index-latest $ASSETS --clobber
          else
            gh release create index-latest $ASSETS --title index-latest \
              --notes "Daily ergon-tracker search-index snapshot."
          fi
          # Prune chain deltas that have rolled out of the deltas.json window (best-effort).
          if [ -f dist/deltas.json ]; then
            KEPT=$(python3 -c "import json,sys; print(' '.join(d['file'] for d in json.load(open('dist/deltas.json')).get('deltas',[])))" 2>/dev/null || echo "")
            for asset in $(gh release view index-latest --json assets \
                --jq '.assets[].name | select(startswith("index-delta-"))' 2>/dev/null); do
              case " $KEPT " in *" $asset "*) : ;; *) gh release delete-asset index-latest "$asset" -y || true ;; esac
            done
          fi

      - name: Upload build artifacts (diagnostics, retained even on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: |
            dist/manifest.json
            dist/gates.json
          if-no-files-found: ignore
